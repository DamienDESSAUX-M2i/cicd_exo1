name: matrix

on:
  - push

jobs:
  test_matrix:
    name: test_${{ matrix.os }}_${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      python-version: ["3.9-latest", "3.10-latest", "3.11-latest"]
      os: ["ubuntu-latest", "windows-latest"]
    
    steps:
      - name: checkout_repository
        uses: actions/checkout@v6
      
      - name: build_app
        uses: setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: install_dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
      
      - name: run_tests
        run: pytest -v